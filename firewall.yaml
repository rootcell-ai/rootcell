# Lima config for the firewall VM. Tiny appliance: mitmproxy + dnsmasq,
# brokers all egress for the agent VM. See firewall-vm.nix for the NixOS
# side and proxy/README.md for ops notes.

images:
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.0.5/nixos-lima-v0.0.5-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:e1daeb0dcec65c624253603ab5ec06f0831b0940cd95a88903f9bfd0ee4009b2c45806b868674c7e8cb12941e50799e85d710fc0e9ad659059108cebbc4d19c1"

mounts: []

portForwards:
  # Same port-68 ignore as the agent VM: nixos-lima/issues/50.
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true

ssh:
  # Keep the Lima control plane independent from guest IP configuration.
  overVsock: true

user:
  home: "/home/{{.User}}"

# Memory: 1 GiB suffices for the steady-state services (mitmproxy +
# dnsmasq), but the initial `nixos-rebuild switch` peaks around 1-2 GiB
# during nixpkgs eval and parallel substituter decompression. 4 GiB
# avoids OOM-kill mid-build. vz balloons unused pages back to the host,
# so this isn't 4 GiB resident on the host all the time.
# Disk: 16 GiB lets the Nix store hold the firewall's closure plus a
# few generations before nix-gc kicks in. After provisioning settles,
# both can be cut back via `limactl edit firewall`.
memory: "4GiB"
cpus: 2
disk: "16GiB"

vmType: vz
mountType: virtiofs

containerd:
  system: false
  user: false

# Two NICs (kernel names assigned by systemd predictable naming):
#   enp0s1 — Apple Virtio NAT (always present with vmType: vz; gives the
#            firewall its internet egress; default route lives here)
#   enp0s2 — lima:host private segment shared with the agent VM (default
#            192.168.106.0/24; the Lima network name and IPs are
#            overridable via .env — see README and network.nix)
#
# We don't redeclare the Virtio NAT here. `vzNAT: true` would be
# redundant with vmType: vz's default. The Lima `interface:` field used
# to live here as a label, but Lima doesn't actually rename the kernel
# device — the kernel uses systemd predictable names regardless — so it
# was misleading and is dropped.
networks:
  - lima: host
