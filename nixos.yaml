# Lima config for the agent VM. The agent has root inside this VM, so its
# only network interface is the per-instance socket_vmnet segment shared
# with the firewall VM (allocated by ./rootcell --instance NAME).
# No internet egress except through the firewall. The repo's patched Lima
# launcher skips the default usernet NIC for this VM and brings up the
# localhost SSH forwarder by polling VSOCK directly.

images:
  - location: "https://github.com/nixos-lima/nixos-lima/releases/download/v0.0.5/nixos-lima-v0.0.5-aarch64.qcow2"
    arch: "aarch64"
    digest: "sha512:e1daeb0dcec65c624253603ab5ec06f0831b0940cd95a88903f9bfd0ee4009b2c45806b868674c7e8cb12941e50799e85d710fc0e9ad659059108cebbc4d19c1"

mounts: []

portForwards:
  # Tell Lima's port-forwarding to ignore port 68 to prevent interception of host DHCP packets
  # Apparently this is an issue with NixOS that does not occur on other Linux distros
  # See: https://github.com/nixos-lima/nixos-lima/issues/50
  - proto: udp
    guestPort: 68
    guestIP: 0.0.0.0
    ignore: true

ssh:
  # The agent VM has no direct usernet NIC in steady state, so Lima
  # control-plane SSH must use VSOCK.
  overVsock: true

user:
  home: "/home/{{.User}}"

memory: "16GiB"
cpus: 8
disk: "60GiB"

vmType: vz
mountType: virtiofs

containerd:
  system: false
  user: false

# Only one explicit Lima network: an unmanaged socket_vmnet socket created
# for this rootcell instance. The patched launcher suppresses Lima's
# implicit default usernet NIC, so this is the only agent NIC and appears
# as enp0s1 in the guest. The socket path is overridden at create time by
# `./rootcell --instance NAME`.
networks:
  - socket: /private/var/run/rootcell/placeholder/default.sock
